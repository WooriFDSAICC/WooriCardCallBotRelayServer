spring:
  application:
    name: WooriRelay

  lifecycle:
    timeout-per-shutdown-phase: 30s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 5

woori:
  relay:
    fast-api-ws-base-url: ${FASTAPI_WS_BASE_URL:ws://localhost:8000/v1/stream}
    fast-api-ws-inbound-base-url: ${FASTAPI_WS_INBOUND_BASE_URL:ws://localhost:8000/v1/stream/inbound}
    fast-api-ws-outbound-base-url: ${FASTAPI_WS_OUTBOUND_BASE_URL:ws://localhost:8000/v1/stream/outbound}
    kafka-topic: ${KAFKA_FDS_TOPIC:wooricard-fds-events}  # default = IntegrationContracts.TOPIC_FDS_EVENTS
    redis-session-key-prefix: "wooricard:session:"
    max-binary-chunk-bytes: ${MAX_BINARY_CHUNK_BYTES:65536}
    websocket:
      allowed-origins: "*"
      max-text-message-buffer-size: 65536
      max-binary-message-buffer-size: 65536
    cti:
      enabled: ${CTI_ENABLED:false}
      base-url: ${CTI_BASE_URL:http://localhost:9000}
      escalation-path: /api/v1/escalations
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
      outbox:
        enabled: ${CTI_OUTBOX_ENABLED:true}
        max-attempts: ${CTI_OUTBOX_MAX_ATTEMPTS:5}
        initial-retry-delay-ms: ${CTI_OUTBOX_INITIAL_RETRY_DELAY_MS:30000}
        retry-interval-ms: ${CTI_OUTBOX_RETRY_INTERVAL_MS:30000}
        batch-size: ${CTI_OUTBOX_BATCH_SIZE:10}
        redis-key-prefix: "wooricard:cti:outbox:"
    distributed-session:
      enabled: ${DISTRIBUTED_SESSION_ENABLED:false}
      instance-id: ${RELAY_INSTANCE_ID:}
      owner-ttl-seconds: ${DISTRIBUTED_SESSION_OWNER_TTL_SECONDS:60}
      heartbeat-interval-ms: ${DISTRIBUTED_SESSION_HEARTBEAT_INTERVAL_MS:20000}
      redis-owner-key-prefix: "wooricard:relay:owner:"
      redis-instance-key-prefix: "wooricard:relay:"

logging:
  level:
    com.woori.woorirelay: INFO
    org.springframework.web.socket: INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{sessionId:-},%X{registryKey:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
