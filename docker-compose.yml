services:
  redis:
    image: redis:7-alpine
    container_name: woori-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  kafka:
    image: bitnamilegacy/kafka:3.9.0
    container_name: woori-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  triton:
    build:
      context: ../WooriTritonMock
      dockerfile: Dockerfile
    container_name: woori-triton
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  cti-mock:
    build:
      context: ../WooriCtiMock
      dockerfile: Dockerfile
    container_name: woori-cti-mock
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  callbot-gateway:
    build:
      context: ../WooriCardCallBotGateway
      dockerfile: Dockerfile
    container_name: woori-callbot-gateway
    ports:
      - "8000:8000"
    environment:
      TRITON_HTTP_URL: http://triton:8001
      TRITON_STARTUP_CHECK: "true"
      ESCALATION_CHUNK_THRESHOLD: 20
      PARTIAL_RESULT_INTERVAL: 5
      METRICS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: WooriCallbotGateway
    depends_on:
      triton:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  fds-gateway:
    build:
      context: ../WooriCardFDSGateway
      dockerfile: Dockerfile
    container_name: woori-fds-gateway
    ports:
      - "8010:8010"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRITON_HTTP_URL: http://triton:8001
      TRITON_FDS_MODEL: fds_lgbm
      TRITON_STARTUP_CHECK: "true"
      GRPC_ENABLED: "false"
      API_KEY_ENABLED: "false"
      INTERNAL_API_KEY: woori-internal-dev-key
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_PER_MINUTE: 300
      METRICS_ENABLED: "true"
      KAFKA_WORKER_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: wooricard-fds-events
      KAFKA_SCORES_TOPIC: wooricard-fds-scores
      KAFKA_ACTIONS_TOPIC: wooricard-fds-actions
      KAFKA_DLQ_ENABLED: "true"
      KAFKA_DLQ_TOPIC: wooricard-fds-events-dlq
      BLOCK_SCORE_THRESHOLD: 90
      ALERT_SCORE_THRESHOLD: 70
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: WooriFdsGateway
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      triton:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  woori-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: woori-relay
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_FDS_TOPIC: wooricard-fds-events
      FASTAPI_WS_BASE_URL: ws://callbot-gateway:8000/v1/stream
      FASTAPI_WS_INBOUND_BASE_URL: ws://callbot-gateway:8000/v1/stream/inbound
      FASTAPI_WS_OUTBOUND_BASE_URL: ws://callbot-gateway:8000/v1/stream/outbound
      CTI_ENABLED: "true"
      CTI_BASE_URL: http://cti-mock:9000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_TRACES_SAMPLER_ARG: "1.0"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      callbot-gateway:
        condition: service_healthy
      fds-gateway:
        condition: service_healthy
      cti-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: woori-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: woori-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: woori-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - alertmanager
      - woori-relay
      - callbot-gateway
      - fds-gateway
      - triton
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: woori-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis-data:
  kafka-data:
